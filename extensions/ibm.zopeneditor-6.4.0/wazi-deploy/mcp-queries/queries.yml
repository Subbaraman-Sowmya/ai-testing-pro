  ListFailures:
    file: ListFailures.yml.j2
    description: List failures during deployment in reversed chronological order of deployments with deploy timestamp, environment name, location and detailed data
    arguments:
      limit:
        type: string
        required: false
        default: "10"
        description: >
          Limit the number of returned commands to the given number. Absent means 10 commands, 0 means no limit.
      environment_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular environment to restrict results to deployments in this environment.
          Glob pattern is accepted to retrieve failures in deployements targeting any environment whose name matches the pattern.
      application_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of an application to restrict results to failures in deployment of this application.
          Glob pattern is accepted to get only failures during deployment of applications whose name matches the pattern.
      application_version:
        type: string
        required: false
        default: undefined
        description: >
          Version of an application to restrict results to failures in deployment of this application version.
          Glob pattern is accepted to get only failures in deployment of applications whose version matches the pattern.
      package_path:
        type: string
        required: false
        default: undefined
        description: >
          Path of a package to restrict results to failures used in deployment of this package.
          Glob pattern is accepted to get only failures in deployment of packages whose path matches the pattern.
      deployed_before:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only failures in deployments done before the given timestamp.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      deployed_after:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only failures in deployments done after the given timestamp.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
    output: |
      A multi document YAML description, having a root document for each deployment in reversed chronological order,
      showing the deploy timestamp (field deploy_timestamp), the target environment name (field environment_name),
      and a list of failures (field failures).
      Each failure item shows the location of the failure information in the evience files (field location) and the detailed
      information about the failure (field details).
    examples:
      - command: wazideploy-evidence -q ListFailures.yml.j2 r
        result: |
