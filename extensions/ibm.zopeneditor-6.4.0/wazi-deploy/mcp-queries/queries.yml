  ListFieldValues:
    file: ListFieldValues.yml.j2
    description: List all the values of the field of given name.
    arguments:
      fieldname:
        type: string
        required: true
        default: name
        description: >
          The name of the targeted field, to get all its values.
      parent_fieldname:
        type: string
        required: false
        default: undefined
        description: >
          The name of the parent field of the targeted field.
    output: |
      A multi-document YAML description with for each document a field named fieldname|values
      containing a list of all values of the field having the name fieldname.
    examples:
      - command: wazideploy-evidence -q ListFieldValues.yml.j2 r fieldname=status
        result: |
          ---
          status|values:
          - Failed
          - Ok
          - Skipped
      - command: wazideploy-evidence -q ListFieldValues.yml.j2 r fieldname=key
        result: |
          ---
          key|values:
          - dependency_set
          - githash
          - giturl
          - path
          - template
          - type
          - wd_manifest_index
