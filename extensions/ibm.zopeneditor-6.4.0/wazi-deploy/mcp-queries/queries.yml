  ListArtifacts:
    file: ListArtifacts.yml.j2
    description: List deployed artifacts with environment name, deploy timestamp, application name (and version if any) and deployed package
    arguments:
      artifact_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular artifact to get only information about this artifact.
          Glob pattern is accepted to get only information about any artifact whose name matches the pattern.
      artifact_type:
        type: string
        required: false
        default: undefined
        description: >
          Type of artifact to get only information about artifacts of this type.
          Glob pattern is accepted to get only information about any artifact whose type matches the pattern.
      environment_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular environment to get only information about artifacts deployed in this environment.
          Glob pattern is accepted to get information about artifacts deployed in any environment whose name matches the pattern.
      application_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular application to get only information about artifacts included in this application.
          Glob pattern is accepted to get information about artifacts of any application whose name matches the pattern.
      application_version:
        type: string
        required: false
        default: undefined
        description: >
          Version of application to get only information about artifacts included in this version of application.
          Glob pattern is accepted to get information about deployments of any application version matching the pattern.
      package_path:
        type: string
        required: false
        default: undefined
        description: >
          Path of a particular package to get only information about artifacts deployed with this package.
          Glob pattern is accepted to get only information about artifacts deployed with a package path matching the pattern.
      deployed_before:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only information about deployments that occured before the given value.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      deployed_after:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only information about deployments that occured after or at the given value.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      history:
        type: boolean
        required: false
        default: false
        description: >
          Indicates whether the result should include information about all deployments or only about the last deployment of
          each artifact in each environment.
    output: |
      A multi document YAML description, having a document for each artifact, in ascending alphanumerical order of artifact <name>.<type>.
      Each root document contains the artifact <name>.<type> (field artifact) and a list of environment items (field environments)
      in ascending alphanumerical order of environment_name.
      Each environment item shows the environment name (field environment_name), and, depending on the value of the argument history:
      - If history is false or absent, information about the last deployement in this environment:
        - the deploy timestamp (field deploy_timestamp),
        - the application name (field application_name),
        - the application version (field application_version) if present,
        - the package path (field package_path)
      - If history is true, all the deployments are listed (field deployments) in chronological order, with for each deployment:
        - the deploy timestamp (field deploy_timestamp),
        - the application name (field application_name)
        - the application version (field application_version) if present,
        - the package path (field package_path)
