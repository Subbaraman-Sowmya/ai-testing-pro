  ListEnvironments:
    file: ListEnvironments.yml.j2
    description: List environments with deployed artifacts, deploy date, application name (and version if any) and package path
    arguments:
      environment_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular environment to get only information about it.
          Glob pattern is accepted to get information about any environment whose name matches the pattern.
      artifact_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular artifact to get only information about deployments of this artifact.
          Glob pattern is accepted to get only information about an artifact whose name matches the pattern.
      artifact_type:
        type: string
        required: false
        default: undefined
        description: >
          Type of artifact to get only information about deployments of artifacts of this type.
          Glob pattern is accepted to get only information about artifacts of type matching the pattern.
      application_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular application to get only information about environments where this application has been deployed.
          Glob pattern is accepted to get information about deployments of any application whose name matches the pattern.
      application_version:
        type: string
        required: false
        default: undefined
        description: >
          Version of application to get only information about deployments of this version of application.
          Glob pattern is accepted to get information about deployments of any application version matching the pattern.
      package_path:
        type: string
        required: false
        default: undefined
        description: >
          Path of a particular package to get only information about environments where this package has been deployed.
          Glob pattern is accepted to get only information about environments where a package matching the pattern has been deployed.
      deployed_before:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only information about deployments that occured before the given value.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      deployed_after:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only information about deployments that occured after or at the given value.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      history:
        type: boolean
        required: false
        default: false
        description: >
          Indicates whether the result should include a list of deployments for each environment, or only information about the last deployment
          for each artifact in each environment.
    output: |
      A multi document YAML description, having a document for each environment, in ascending alphanumerical order.
      Each document contains the environment name (field environment_name) and a list of deployed artifact item (field artifacts) in ascending alphanumerical order.
      Each artifact item shows the artifact <name>.<type> (field artifact), and, depending on the value of the argument history:
      - If history is false, information about the last deployment of the current artifact in the current environment:
        the deploy timestamp (field deploy_timestamp), the application name (field application_name) and version (field application_version),
        and finally the deployed package path (field package_path).
      - If history is true, the list of deployments (field deployments) of the current artifact in the current environment in chronological order, each item including:
        the deploy timestamp (field deploy_timestamp), application name (field application_name) and version if any (field application_version),
        and finally the deployed package path (field package_path).
    examples:
      - command: wazideploy-evidence -q ListEnvironments.yml.j2 r
        result: |
          ---
          environment_name: zos.dev.acceptance
          artifacts:
          - artifact: INQACC.CICSLOAD
            deploy_timestamp: 20240904.105515.938
            application_name: cics-banking-sample-application
            package_path: /var/workspace/cics-banking-sample-application/build-169/logs/cics-banking-sample-application.tar
          - artifact: INQACC.DBRM
