---
queries:
  ListDeployments:
    file: ListDeployments.yml.j2
    description: List deployments with deploy timestamp, evidence file path, application name and version, environment name, package path and status
    arguments:
      status:
        type: string
        required: false
        default: Ok
        description: >
          End status of the deployment to get only information about deployment ending with this status.
          When not provided, only deployments with end status Ok will be listed.
          Glob pattern is accepted to get information about any deployment whose end status matches the pattern.
      environment_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular environment to get only information about it.
          Glob pattern is accepted to get information about any deployment in an environment whose name matches the pattern.
      artifact_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular artifact to get only information about deployments of this artifact.
          Glob pattern is accepted to get only information about an artifact whose name matches the pattern.
      artifact_type:
        type: string
        required: false
        default: undefined
        description: >
          Type of artifact to get only information about deployments of artifacts of this type.
          Glob pattern is accepted to get only information about artifacts of type matching the pattern.
      application_name:
        type: string
        required: false
        default: undefined
        description: >
          Name of a particular application to get only information about deployments of this application.
          Glob pattern is accepted to get information about deployments of any application whose name matches the pattern.
      application_version:
        type: string
        required: false
        default: undefined
        description: >
          Version of application to get only information about deployments of this version of application.
          Glob pattern is accepted to get information about deployments of any application version matching the pattern.
      package_path:
        type: string
        required: false
        default: undefined
        description: >
          Path of a particular package to get only information about deployments of this package.
          Glob pattern is accepted to get only information about deployments of a package matching the pattern.
      deployed_before:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only information about deployments that occured before the given value.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      deployed_after:
        type: string
        required: false
        default: undefined
        description: >
          Timestamp to get only information about deployments that occured after or at the given value.
          The format is YYYYMMDD.HHmmSS.sss with digits Y: year, M: month, D: day, H: hour, m: minute, S: second, s: millisecond
      history:
        type: boolean
        required: false
        default: false
        description: >
          Indicates whether the result should include a list of deployments for each environment, or only information about the last deployment
          for each artifact in each environment.
    output: |
      A multi document YAML description, having a document for each deployment, in reversed chronological order.
      Each document contains the deploy timestamp (field deploy_timestamp), the evidence file path (field evidence_file_path),
      the environment name (field environment_name), the application name and version (fields application_name and application_version),
      the package path (field package_path), the deployment end status (field status)
      and a list of deployed artifact <name>.<type> (field artifacts).
