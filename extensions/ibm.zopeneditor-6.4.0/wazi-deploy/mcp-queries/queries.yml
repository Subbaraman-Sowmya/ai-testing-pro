          - artifact: INQACC.CICSLOAD
            deploy_timestamp: 20250807.093358.976
            application_name: cics-banking-sample-application
            application_version: 20250805.061133.391
            package_path: /var/workspace/cics-banking-sample-application/build-222/deployPkgDir/applicationArchive.tar
          - artifact: INQACC.DBRM
            deploy_timestamp: 20250807.093358.976
